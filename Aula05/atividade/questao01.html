<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividade PHP</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      form {
        max-width: 300px;
        margin: auto;
      }
      label,
      input,
      button {
        display: block;
        width: 100%;
        margin-bottom: 10px;
        border-radius: 4px;
      }
      button {
        padding: 20px;
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <form method="post" action="questao01.php">
      <label for="numero">Digite um número entre 5 e 50:</label>
      <input
        type="number"
        id="numero"
        name="numero"
        min="5"
        max="50"
        required
      />
      <button type="submit">Gerar Tabuada</button>
    </form>
  </body>
</html>
