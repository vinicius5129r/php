<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contato</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: inline-block;
            width: 150px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="email"], input[type="date"], textarea {
            width: 300px;
            padding: 5px;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
</head>
<body>
    <h2>Cadastro de Contato</h2>
    <form action="recebe.php" method="post">
        <label for="txtnome">Nome:</label>
        <input type="text" id="txtnome" name="txtnome" required><br><br>

        <label for="txtemail">Email:</label>
        <input type="email" id="txtemail" name="txtemail" required><br><br>

        <label for="txttelefone">Telefone:</label>
        <input type="text" id="txttelefone" name="txttelefone" required><br><br>

        <label for="txtendereco">Endereço:</label>
        <input type="text" id="txtendereco" name="txtendereco" required><br><br>

        <label for="txtobs">Observação:</label>
        <textarea id="txtobs" name="txtobs"></textarea><br><br>

        <label for="txtdataaniv">Data de Aniversário:</label>
        <input type="date" id="txtdataaniv" name="txtdataaniv" required><br><br>

        <input type="submit" value="Cadastrar">
    </form>
</body>
</html>
