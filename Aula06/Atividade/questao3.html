<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renda Líquida Aliquota</title>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const cpfInput = document.getElementById("cpf");

        cpfInput.addEventListener("input", function () {
          let value = cpfInput.value.replace(/\D/g, "");
          if (value.length > 11) value = value.slice(0, 11);
          value = value.replace(/(\d{3})(\d)/, "$1.$2");
          value = value.replace(/(\d{3})(\d)/, "$1.$2");
          value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
          cpfInput.value = value;
        });
      });
    </script>
  </head>
  <body>
    <h1>Calcular o Imposto de Renda</h1>
    <form method="post" action="questao3.php">
      <label>CPF:</label>
      <input type="text" id="cpf" name="cpf" required />
      <label>Número de Dependentes:</label>
      <input type="number" id="dependentes" name="dependentes" min="0" />
      <label>Renda Mensal:</label>
      <input type="number" id="renda" name="renda" min="0" step="0.01" />
      <button type="submit">Calcular</button>
    </form>
  </body>
</html>
